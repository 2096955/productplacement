# ============================================================
# cloudbuild.yaml — CI equivalent of deploy/deploy.sh.
#
# Builds the multi-stage image, pushes it to Artifact Registry,
# and deploys the single Cloud Run service. Equivalent to:
#   gcloud run deploy ssr-concept-lab --source . ...
#
# Run manually:
#   gcloud builds submit --config deploy/cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_VERTEX_LOCATION=us-central1
#
# Or wire to a Cloud Build trigger on push. $PROJECT_ID is provided
# automatically by Cloud Build; other values come from substitutions.
#
# NOTE: the Cloud Run runtime service account must hold
#       roles/aiplatform.user for LIVE (Vertex) mode — see deploy.sh.
# ============================================================

substitutions:
  _SERVICE: ssr-concept-lab
  _REGION: us-central1
  _VERTEX_LOCATION: us-central1
  _GEMINI_MODEL: gemini-2.5-flash
  _EMBED_MODEL: gemini-embedding-001
  _SSR_TEMPERATURE: "0.05"
  _AR_REPO: cloud-run-source-deploy

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:latest"

steps:
  # --- Build the multi-stage image from the repo Dockerfile ---
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:latest"
      - "."

  # --- Push both tags ---
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}"

  # --- Deploy to Cloud Run ---
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE}"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--project=${PROJECT_ID}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--timeout=60"
      - "--max-instances=4"
      - "--concurrency=40"
      - "--set-env-vars=VERTEX_PROJECT=${PROJECT_ID},VERTEX_LOCATION=${_VERTEX_LOCATION},GEMINI_MODEL=${_GEMINI_MODEL},EMBED_MODEL=${_EMBED_MODEL},SSR_TEMPERATURE=${_SSR_TEMPERATURE},RATE_LIMIT_PER_MIN=20"
